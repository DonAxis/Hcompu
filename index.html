<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historia de la Computación</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d0d1a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, #0d0d1a 0%, #1a1a3e 50%, #0d0d1a 100%);
      border-bottom: 2px solid #00d4ff;
      padding: 48px 20px 36px;
      text-align: center;
    }
    header h1 {
      font-size: clamp(1.8rem, 5vw, 3.2rem);
      letter-spacing: 3px;
      color: #00d4ff;
      text-shadow: 0 0 30px rgba(0,212,255,0.5);
    }
    header p {
      margin-top: 10px;
      color: #8888aa;
      font-size: 1rem;
      letter-spacing: 1px;
    }

    /* ── SECCIONES ── */
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 20px 60px;
    }

    .section { margin-top: 64px; }

    .section-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 40px;
    }
    .section-number {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #00d4ff;
      color: #0d0d1a;
      font-weight: 800;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .section-title {
      font-size: clamp(1.1rem, 2.5vw, 1.5rem);
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 1px;
    }
    .section-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, #00d4ff44, #00d4ff11);
    }
    .section-era {
      font-size: 0.78rem;
      color: #00d4ff;
      letter-spacing: 2px;
      white-space: nowrap;
    }

    /* ── TIMELINE ── */
    .timeline {
      position: relative;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .timeline::before {
      content: '';
      position: absolute;
      top: 80px;
      left: calc(16.66% - 1px);
      right: calc(16.66% - 1px);
      height: 2px;
      background: linear-gradient(to right, #00d4ff88, #7b5ea788, #00d4ff88);
      z-index: 0;
    }

    .tl-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      cursor: pointer;
      padding: 0 8px;
    }

    .tl-img-wrap {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 3px solid #2a2a5a;
      overflow: hidden;
      position: relative;
      z-index: 1;
      transition: border-color 0.25s, box-shadow 0.25s, transform 0.25s;
      background: #12122a;
    }
    .tl-item:hover .tl-img-wrap {
      border-color: #00d4ff;
      box-shadow: 0 0 24px rgba(0,212,255,0.5);
      transform: scale(1.06);
    }
    .tl-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s;
    }
    .tl-item:hover .tl-img-wrap img { transform: scale(1.1); }

    .tl-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #00d4ff;
      border: 2px solid #0d0d1a;
      margin: 10px 0;
      position: relative;
      z-index: 1;
      transition: transform 0.2s;
    }
    .tl-item:hover .tl-dot { transform: scale(1.4); }

    .tl-year {
      font-size: 0.72rem;
      color: #00d4ff;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 5px;
      text-align: center;
    }
    .tl-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: #ffffff;
      text-align: center;
      line-height: 1.3;
      max-width: 140px;
    }

    .section-divider {
      height: 1px;
      background: linear-gradient(to right, transparent, #2a2a5a, transparent);
      margin-top: 64px;
    }

    /* ── MODAL ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.87);
      backdrop-filter: blur(5px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #modal-overlay.active { display: flex; }

    #modal {
      background: #12122a;
      border: 1px solid #00d4ff;
      border-radius: 18px;
      max-width: 820px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 0 60px rgba(0,212,255,0.3);
      display: flex;
      flex-direction: column;
      animation: popIn 0.22s ease;
    }
    @keyframes popIn {
      from { transform: scale(0.88); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    #modal-img {
      width: 100%;
      max-height: 360px;
      object-fit: cover;
      border-radius: 16px 16px 0 0;
    }
    #modal-body { padding: 28px 32px 32px; }
    #modal-year {
      font-size: 0.78rem;
      color: #00d4ff;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
    #modal-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 18px;
    }
    #modal-text {
      font-size: 0.97rem;
      line-height: 1.85;
      color: #c8c8dd;
      background: #0d0d1a;
      border: 1px solid #2a2a5a;
      border-radius: 10px;
      padding: 20px;
      white-space: pre-wrap;
    }
    #modal-close {
      position: sticky;
      top: 12px;
      float: right;
      margin: 12px 14px 0 0;
      background: none;
      border: 1px solid #555;
      color: #aaa;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      font-size: 1.1rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      line-height: 34px;
      text-align: center;
    }
    #modal-close:hover { border-color: #00d4ff; color: #00d4ff; }

    footer {
      text-align: center;
      padding: 32px;
      color: #444466;
      font-size: 0.8rem;
      border-top: 1px solid #1a1a3a;
      margin-top: 20px;
    }

    @media (max-width: 640px) {
      .timeline { flex-direction: column; align-items: center; gap: 32px; }
      .timeline::before {
        top: 80px; left: 50%; right: auto;
        width: 2px; height: calc(100% - 80px);
        background: linear-gradient(to bottom, #00d4ff88, #7b5ea788, #00d4ff88);
      }
      .tl-item { width: 100%; max-width: 240px; }
      .section-era { display: none; }
    }
  </style>
</head>

Prácticamente todas las computadoras actuales, desde supercomputadoras hasta microcontroladores, siguen este modelo fundamental. Von Neumann también contribuyó al Proyecto Manhattan, fundó la teoría de juegos y realizó aportaciones fundamentales a la mecánica cuántica.

        text: `En octubre de 2019, Google anunció la "supremacía cuántica": su procesador Sycamore de 53 qubits completó en 200 segundos un cálculo que tomaría 10,000 años a la supercomputadora clásica más poderosa.

La computación cuántica aprovecha los principios de la mecánica cuántica —superposición y entrelazamiento— para procesar información de formas radicalmente diferentes. Un qubit puede existir en múltiples estados simultáneamente, no solo 0 o 1.

Las aplicaciones potenciales son transformadoras: descubrimiento de medicamentos, nueva criptografía, optimización logística, modelado climático y aceleración del Machine Learning.

En 2023, IBM presentó el chip Condor de 1,121 qubits. Los expertos estiman que las computadoras cuánticas prácticas podrían llegar entre 2030 y 2040.`
      }
    ]
  }
];

const page = document.getElementById('page');

sections.forEach((sec, si) => {
  const section = document.createElement('div');
  section.className = 'section';
  section.innerHTML = `
    <div class="section-header">
      <div class="section-number">${sec.number}</div>
      <div class="section-title">${sec.title}</div>
      <div class="section-line"></div>
      <div class="section-era">${sec.era}</div>
    </div>
    <div class="timeline" id="tl-${si}"></div>
  `;
  page.appendChild(section);

  if (si < sections.length - 1) {
    const div = document.createElement('div');
    div.className = 'section-divider';
    page.appendChild(div);
  }

  const tl = section.querySelector(`#tl-${si}`);
  sec.items.forEach(item => {
    const node = document.createElement('div');
    node.className = 'tl-item';
    node.innerHTML = `
      <div class="tl-img-wrap">
        <img src="${item.img}" alt="${item.title}" loading="lazy">
      </div>
      <div class="tl-dot"></div>
      <div class="tl-year">${item.year}</div>
      <div class="tl-title">${item.title}</div>
    `;
    node.addEventListener('click', () => openModal(item));
    tl.appendChild(node);
  });
});

const overlay    = document.getElementById('modal-overlay');
const modalImg   = document.getElementById('modal-img');
const modalYear  = document.getElementById('modal-year');
const modalTitle = document.getElementById('modal-title');
const modalText  = document.getElementById('modal-text');
const btnClose   = document.getElementById('modal-close');

function openModal(item) {
  modalImg.src           = item.img;
  modalImg.alt           = item.title;
  modalYear.textContent  = item.year;
  modalTitle.textContent = item.title;
  modalText.textContent  = item.text;
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  overlay.classList.remove('active');
  document.body.style.overflow = '';
}

btnClose.addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
