<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historia de la Computación</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d0d1a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, #0d0d1a 0%, #1a1a3e 50%, #0d0d1a 100%);
      border-bottom: 2px solid #00d4ff;
      padding: 40px 20px;
      text-align: center;
    }
    header img.banner {
      max-width: 320px;
      width: 90%;
      border-radius: 12px;
      box-shadow: 0 0 30px rgba(0,212,255,0.4);
      margin-bottom: 20px;
    }
    header h1 {
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      letter-spacing: 2px;
      color: #00d4ff;
      text-shadow: 0 0 20px rgba(0,212,255,0.6);
    }
    header p {
      margin-top: 8px;
      color: #8888aa;
      font-size: 0.95rem;
    }

    /* ── GRID ── */
    main {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 24px;
    }

    .card {
      background: #12122a;
      border: 1px solid #2a2a5a;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
    }
    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 8px 30px rgba(0,212,255,0.3);
      border-color: #00d4ff;
    }
    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
    }
    .card-label {
      padding: 12px 14px;
    }
    .card-label .year {
      font-size: 0.72rem;
      color: #00d4ff;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .card-label h2 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #ffffff;
      line-height: 1.3;
    }

    /* ── MODAL ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #modal-overlay.active { display: flex; }

    #modal {
      background: #12122a;
      border: 1px solid #00d4ff;
      border-radius: 18px;
      max-width: 820px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 0 60px rgba(0,212,255,0.3);
      display: flex;
      flex-direction: column;
      animation: popIn 0.25s ease;
    }
    @keyframes popIn {
      from { transform: scale(0.88); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    #modal-img {
      width: 100%;
      max-height: 380px;
      object-fit: cover;
      border-radius: 16px 16px 0 0;
    }

    #modal-body {
      padding: 28px 32px 32px;
    }
    #modal-year {
      font-size: 0.78rem;
      color: #00d4ff;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
    #modal-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 18px;
    }
    #modal-text {
      font-size: 0.97rem;
      line-height: 1.8;
      color: #c8c8dd;
      background: #0d0d1a;
      border: 1px solid #2a2a5a;
      border-radius: 10px;
      padding: 20px;
      white-space: pre-wrap;
    }

    #modal-close {
      position: sticky;
      top: 12px;
      float: right;
      margin: 12px 14px 0 0;
      background: none;
      border: 1px solid #555;
      color: #aaa;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      font-size: 1.1rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      line-height: 34px;
      text-align: center;
    }
    #modal-close:hover { border-color: #00d4ff; color: #00d4ff; }

    footer {
      text-align: center;
      padding: 30px;
      color: #444466;
      font-size: 0.8rem;
    }

    @media (max-width: 480px) {
      main { grid-template-columns: repeat(2, 1fr); gap: 14px; }
      #modal-body { padding: 18px; }
    }
  </style>
</head>
<body>

<header>
  <img class="banner" src="bueno.png" alt="Historia de la Computación">
  <h1>Historia de la Computación</h1>
  <p>18 hitos que cambiaron el mundo digital</p>
</header>

<main id="grid"></main>

<div id="modal-overlay">
  <div id="modal">
    <button id="modal-close">✕</button>

    <div id="modal-body">
      <div id="modal-year"></div>
      <div id="modal-title"></div>
      <div id="modal-text"></div>
    </div>
  </div>
</div>

<footer>Historia de la Computación &mdash; Proyecto educativo</footer>

La computación cuántica aprovecha los principios de la mecánica cuántica —superposición y entrelazamiento— para procesar información de formas radicalmente diferentes a las computadoras clásicas. Un qubit cuántico puede existir en múltiples estados simultáneamente (no solo 0 o 1), permitiendo explorar millones de posibilidades en paralelo.

Las aplicaciones potenciales son transformadoras: descubrimiento de medicamentos (simulando moléculas complejas), criptografía (rompiendo y creando nuevos sistemas de cifrado), optimización logística, modelado climático y aceleración del Machine Learning.

Empresas como IBM, Google, Microsoft, IonQ y startups especializadas compiten en esta carrera. En 2023, IBM presentó el chip Condor de 1,121 qubits. Sin embargo, los desafíos son enormes: los qubits son extremadamente frágiles y los errores cuánticos siguen siendo el principal obstáculo. Los expertos estiman que las computadoras cuánticas prácticas y generalizadas podrían llegar entre 2030 y 2040.`
  }
];

const grid = document.getElementById('grid');
const overlay = document.getElementById('modal-overlay');
const modalImg = document.getElementById('modal-img');
const modalYear = document.getElementById('modal-year');
const modalTitle = document.getElementById('modal-title');
const modalText = document.getElementById('modal-text');
const btnClose = document.getElementById('modal-close');

items.forEach(item => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <img src="${item.img}" alt="${item.title}" loading="lazy">
    <div class="card-label">
      <div class="year">${item.year}</div>
      <h2>${item.title}</h2>
    </div>
  `;
  card.addEventListener('click', () => openModal(item));
  grid.appendChild(card);
});

function openModal(item) {
  modalImg.src = item.img;
  modalImg.alt = item.title;
  modalYear.textContent = item.year;
  modalTitle.textContent = item.title;
  modalText.textContent = item.text;
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  overlay.classList.remove('active');
  document.body.style.overflow = '';
}

btnClose.addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
